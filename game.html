<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1A1A2E">
<title>Ashen Lineage</title>

<style>
body { margin: 0; overflow: hidden; background: #1A1A2E; font-family: 'Press Start 2P', monospace; }

#gameCanvas {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  display: block;
  image-rendering: pixelated;
  image-rendering: crisp-edges;
}

#loadingScreen {
  position: fixed;
  inset: 0;
  z-index: 1000;
  background: #0D0D1A;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  transition: opacity 0.6s ease-out;
}
.load-title {
  color: #C0392B;
  font-size: clamp(16px, 5vw, 26px);
  letter-spacing: 3px;
  text-shadow: 2px 2px 0 #1A1A2E, 0 0 16px rgba(192,57,43,0.5);
  margin-bottom: 40px;
}
.load-bar-wrap {
  width: 200px;
  height: 12px;
  border: 2px solid #333;
  background: #111;
  box-shadow: inset 0 0 4px rgba(0,0,0,0.6);
}
.load-bar-fill {
  width: 0%;
  height: 100%;
  background: #C0392B;
  transition: width 0.15s ease-out;
}
.load-text {
  color: #555;
  font-size: 8px;
  margin-top: 14px;
  letter-spacing: 1px;
}

#charCreateModal {
  position: fixed;
  inset: 0;
  z-index: 900;
  background: rgba(0,0,0,0.92);
  display: none;
  align-items: center;
  justify-content: center;
  padding: 16px;
}
#charCreateModal.visible { display: flex; }
.cc-card {
  background: #16213E;
  padding: 36px 28px 28px;
  box-shadow:
    0 0 0 2px #0F3460,
    0 0 0 4px #1A1A2E,
    0 0 0 6px #0F3460,
    0 4px 32px rgba(0,0,0,0.7);
  max-width: 420px;
  width: 100%;
  text-align: center;
}
.cc-heading {
  color: #C0392B;
  font-size: clamp(12px, 3.5vw, 16px);
  letter-spacing: 2px;
  margin: 0 0 8px;
  text-shadow: 0 0 10px rgba(192,57,43,0.3);
}
.cc-username {
  color: #8888AA;
  font-size: 9px;
  margin-bottom: 28px;
}
.cc-race-label {
  color: #8888AA;
  font-size: 7px;
  letter-spacing: 2px;
  margin-bottom: 8px;
}
.cc-race-display {
  color: #E0E0E0;
  font-size: clamp(14px, 4vw, 20px);
  min-height: 32px;
  line-height: 32px;
  margin-bottom: 24px;
  letter-spacing: 2px;
  transition: color 0.3s, text-shadow 0.3s;
}
.cc-race-display.final {
  color: #C0392B;
  text-shadow: 0 0 12px rgba(192,57,43,0.6), 0 0 24px rgba(192,57,43,0.3);
}
.cc-error {
  color: #FF6B6B;
  font-size: 8px;
  min-height: 14px;
  margin-bottom: 10px;
}
.cc-input {
  width: 100%;
  padding: 14px 12px;
  font-family: 'Press Start 2P', monospace;
  font-size: 11px;
  background: #0D1B2A;
  color: #E0E0E0;
  border: 2px solid #2A2A4A;
  outline: none;
  margin-bottom: 20px;
  box-sizing: border-box;
  transition: border-color 0.15s;
}
.cc-input:focus { border-color: #C0392B; }
.cc-input::placeholder { color: #444466; }
.cc-submit {
  width: 100%;
  padding: 16px;
  font-family: 'Press Start 2P', monospace;
  font-size: clamp(10px, 2.5vw, 12px);
  background: #C0392B;
  color: #fff;
  border: none;
  cursor: pointer;
  letter-spacing: 1px;
  transition: background 0.15s;
  min-height: 52px;
}
.cc-submit:hover:not(:disabled) { background: #E74C3C; }
.cc-submit:disabled { opacity: 0.5; cursor: not-allowed; }
</style>
</head>
<body>

<div id="loadingScreen">
  <div class="load-title">ASHEN LINEAGE</div>
  <div class="load-bar-wrap">
    <div class="load-bar-fill" id="loadBarFill"></div>
  </div>
  <div class="load-text" id="loadText">Connecting...</div>
</div>

<div id="charCreateModal">
  <div class="cc-card">
    <h2 class="cc-heading">FORGE YOUR HEIR</h2>
    <div class="cc-username" id="ccUsername"></div>
    <div class="cc-race-label">YOUR BLOODLINE</div>
    <div class="cc-race-display" id="ccRaceDisplay">&mdash;</div>
    <div class="cc-error" id="ccError"></div>
    <input type="text" class="cc-input" id="ccNameInput" placeholder="NAME YOUR HEIR" maxlength="20" autocomplete="off">
    <button class="cc-submit" id="ccSubmit">BEGIN YOUR LINEAGE</button>
  </div>
</div>
